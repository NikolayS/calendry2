# Calendry — self-hosted Supabase + web + worker
#
# Official Supabase images pinned to current latest stable (2024-12 / 2025-01).
# Postgres pinned to 18 (per SPEC.amendments.md).
#
# Usage:
#   cp .env.example .env.local
#   # Edit .env.local — fill every required variable
#   docker compose -f ops/docker-compose.yml --env-file .env.local up -d
#
# After first boot, copy the printed SUPABASE_ANON_KEY + SUPABASE_SERVICE_ROLE_KEY
# into .env.local, then restart the web and worker services.

name: calendry

volumes:
  pg_data:

networks:
  internal:

services:

  # ── Postgres 18 ────────────────────────────────────────────────────────────────
  postgres:
    image: supabase/postgres:15.8.1.060  # Supabase-patched Postgres; PG18 deferred — see SPEC.amendments.md
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Post-init hook: supabase/postgres migrate.sh runs /etc/postgresql.schema.sql last,
      # after all service roles are created. We use it to set TCP passwords on those roles
      # (the image creates them with no password; pg_hba.conf requires scram-sha-256).
      - ./postgres-init/00-supabase-roles.sql:/etc/postgresql.schema.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Mailpit (local-first SMTP capture — dev/test only) ────────────────────────
  mailpit:
    image: axllent/mailpit:v1.29.7
    restart: unless-stopped
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── GoTrue (admin auth: magic link + Google OAuth) ─────────────────────────────
  gotrue:
    image: supabase/gotrue:v2.172.1
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    environment:
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: >-
        postgres://supabase_auth_admin:${SUPABASE_AUTH_ADMIN_PASSWORD:-auth_admin_pw_local}@postgres:5432/postgres?sslmode=disable&search_path=auth
      GOTRUE_SITE_URL: ${GOTRUE_SITE_URL:-http://localhost:3000}
      GOTRUE_URI_ALLOW_LIST: ${GOTRUE_SITE_URL:-http://localhost:3000}
      GOTRUE_DISABLE_SIGNUP: "true"
      GOTRUE_JWT_SECRET: ${GOTRUE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "false"
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-mailpit}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-1025}
      GOTRUE_SMTP_USER: ${SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${SMTP_PASSWORD:-}
      GOTRUE_SMTP_ADMIN_EMAIL: ${EMAIL_FROM:-noreply@example.com}
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /api/auth/callback
      GOTRUE_MAILER_URLPATHS_RECOVERY: /api/auth/callback
      API_EXTERNAL_URL: ${NEXT_PUBLIC_URL:-http://localhost:3000}
      PORT: 9999
    ports:
      - "${GOTRUE_PORT:-9999}:9999"
    networks:
      - internal

  # ── PostgREST ──────────────────────────────────────────────────────────────────
  postgrest:
    image: postgrest/postgrest:v12.2.12
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgresql://authenticator:${AUTHENTICATOR_PASSWORD:-authenticator_pw_local}@postgres:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters}
      PGRST_DB_USE_LEGACY_GUCS: "false"
    ports:
      - "${POSTGREST_PORT:-3001}:3000"
    networks:
      - internal

  # ── Supabase Realtime ──────────────────────────────────────────────────────────
  realtime:
    image: supabase/realtime:v2.34.47
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters}
      FLY_ALLOC_ID: local
      FLY_APP_NAME: realtime
      SECRET_KEY_BASE: UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1/u2oq
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"
      PORT: 4000
    ports:
      - "${REALTIME_PORT:-4000}:4000"
    networks:
      - internal

  # ── Supabase Studio ────────────────────────────────────────────────────────────
  studio:
    image: supabase/studio:2025.05.19-sha-6359843
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DEFAULT_ORGANIZATION_NAME: ${STUDIO_DEFAULT_ORGANIZATION:-Calendry}
      DEFAULT_PROJECT_NAME: ${STUDIO_DEFAULT_PROJECT:-calendry2}
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${NEXT_PUBLIC_URL:-http://localhost:3000}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      AUTH_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters}
      LOGFLARE_API_KEY: ${LOGFLARE_API_KEY:-}
      LOGFLARE_URL: http://analytics:4000
      NEXT_PUBLIC_ENABLE_LOGS: "true"
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-admin}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-admin}
    ports:
      - "${STUDIO_PORT:-3002}:3000"
    networks:
      - internal

  # ── Supabase Meta (pg-meta — used by Studio) ───────────────────────────────────
  meta:
    image: supabase/postgres-meta:v0.87.3
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: postgres
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    networks:
      - internal

  # ── Calendry web (Next.js) ─────────────────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: ops/Dockerfile
    restart: unless-stopped
    environment:
      ENTRYPOINT: web
      NODE_ENV: production
      NEXT_PUBLIC_URL: ${NEXT_PUBLIC_URL:-http://localhost:3000}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:3001}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/postgres}
      CSRF_SECRET: ${CSRF_SECRET:-changeme}
      BOOKING_TOKEN_SECRET: ${BOOKING_TOKEN_SECRET:-changeme}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@example.com}
      EMAIL_DRIVER: ${EMAIL_DRIVER:-smtp}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      RATE_LIMIT_BOOKING_IP_PER_MIN: ${RATE_LIMIT_BOOKING_IP_PER_MIN:-10}
      RATE_LIMIT_BOOKING_EMAIL_PER_MIN: ${RATE_LIMIT_BOOKING_EMAIL_PER_MIN:-3}
      # Internal GoTrue URL — web calls this server-side to proxy magic-link requests
      GOTRUE_URL: http://gotrue:9999
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    networks:
      - internal

  # ── Calendry worker (Bun / pgque) ──────────────────────────────────────────────
  worker:
    build:
      context: ..
      dockerfile: ops/Dockerfile
    restart: unless-stopped
    environment:
      ENTRYPOINT: worker
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/postgres}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@example.com}
      EMAIL_DRIVER: ${EMAIL_DRIVER:-smtp}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      BOOKING_TOKEN_SECRET: ${BOOKING_TOKEN_SECRET:-changeme}
      NEXT_PUBLIC_URL: ${NEXT_PUBLIC_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    networks:
      - internal
