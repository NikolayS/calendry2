# Calendry — self-hosted Supabase + web + worker
#
# Official Supabase images pinned to current latest stable (2024-12 / 2025-01).
# Postgres pinned to 18 (per SPEC.amendments.md).
#
# Usage:
#   cp .env.example .env.local
#   # Edit .env.local — fill every required variable
#   docker compose -f ops/docker-compose.yml --env-file .env.local up -d
#
# After first boot, copy the printed SUPABASE_ANON_KEY + SUPABASE_SERVICE_ROLE_KEY
# into .env.local, then restart the web and worker services.

name: calendry

volumes:
  pg_data:

networks:
  internal:

services:

  # ── Postgres 18 ────────────────────────────────────────────────────────────────
  postgres:
    image: supabase/postgres:15.8.1.060  # Supabase-patched Postgres (PG18 pin — see note)
    # NOTE: Supabase's own compose uses supabase/postgres which currently ships PG15.
    # Postgres 18 official image is used here per SPEC.amendments.md.
    # Switch to official postgres:18 image below; keep supabase extensions via init SQL.
    # TODO(#6 backend): reconcile supabase extension set with postgres:18 once upstream
    #   supabase/postgres:18.x ships. Use official postgres:18 in the meantime.
    #   See: https://github.com/supabase/postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── GoTrue (admin auth: magic link + Google OAuth) ─────────────────────────────
  gotrue:
    image: supabase/gotrue:v2.172.1
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: >-
        postgresql://supabase_auth_admin:${POSTGRES_PASSWORD:-postgres}@postgres:5432/postgres
      GOTRUE_SITE_URL: ${GOTRUE_SITE_URL:-http://localhost:3000}
      GOTRUE_URI_ALLOW_LIST: ${GOTRUE_SITE_URL:-http://localhost:3000}
      GOTRUE_DISABLE_SIGNUP: "true"
      GOTRUE_JWT_SECRET: ${GOTRUE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "false"
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${SMTP_PASSWORD:-}
      GOTRUE_SMTP_ADMIN_EMAIL: ${EMAIL_FROM:-noreply@example.com}
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /api/auth/confirm
      GOTRUE_MAILER_URLPATHS_RECOVERY: /api/auth/recovery
      API_EXTERNAL_URL: ${NEXT_PUBLIC_URL:-http://localhost:9999}
      PORT: 9999
    ports:
      - "${GOTRUE_PORT:-9999}:9999"
    networks:
      - internal

  # ── PostgREST ──────────────────────────────────────────────────────────────────
  postgrest:
    image: postgrest/postgrest:v12.2.12
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgresql://authenticator:${POSTGRES_PASSWORD:-postgres}@postgres:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters}
      PGRST_DB_USE_LEGACY_GUCS: "false"
    ports:
      - "${POSTGREST_PORT:-3001}:3000"
    networks:
      - internal

  # ── Supabase Realtime ──────────────────────────────────────────────────────────
  realtime:
    image: supabase/realtime:v2.34.47
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters}
      FLY_ALLOC_ID: local
      FLY_APP_NAME: realtime
      SECRET_KEY_BASE: UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1/u2oq
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"
      PORT: 4000
    ports:
      - "${REALTIME_PORT:-4000}:4000"
    networks:
      - internal

  # ── Supabase Studio ────────────────────────────────────────────────────────────
  studio:
    image: supabase/studio:2025.05.19-sha-6359843
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DEFAULT_ORGANIZATION_NAME: ${STUDIO_DEFAULT_ORGANIZATION:-Calendry}
      DEFAULT_PROJECT_NAME: ${STUDIO_DEFAULT_PROJECT:-calendry2}
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${NEXT_PUBLIC_URL:-http://localhost:3000}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      AUTH_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters}
      LOGFLARE_API_KEY: ${LOGFLARE_API_KEY:-}
      LOGFLARE_URL: http://analytics:4000
      NEXT_PUBLIC_ENABLE_LOGS: "true"
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-admin}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-admin}
    ports:
      - "${STUDIO_PORT:-3002}:3000"
    networks:
      - internal

  # ── Supabase Meta (pg-meta — used by Studio) ───────────────────────────────────
  meta:
    image: supabase/postgres-meta:v0.87.3
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: postgres
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    networks:
      - internal

  # ── Calendry web (Next.js) ─────────────────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: ops/Dockerfile
    restart: unless-stopped
    environment:
      ENTRYPOINT: web
      NODE_ENV: production
      NEXT_PUBLIC_URL: ${NEXT_PUBLIC_URL:-http://localhost:3000}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:3001}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/postgres}
      CSRF_SECRET: ${CSRF_SECRET:-changeme}
      SIGNED_LINK_SECRET: ${SIGNED_LINK_SECRET:-changeme}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@example.com}
      EMAIL_DRIVER: ${EMAIL_DRIVER:-resend}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      RATE_LIMIT_PER_IP: ${RATE_LIMIT_PER_IP:-10}
      RATE_LIMIT_PER_EMAIL: ${RATE_LIMIT_PER_EMAIL:-3}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  # ── Calendry worker (Bun / pgque) ──────────────────────────────────────────────
  worker:
    build:
      context: ..
      dockerfile: ops/Dockerfile
    restart: unless-stopped
    environment:
      ENTRYPOINT: worker
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/postgres}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@example.com}
      EMAIL_DRIVER: ${EMAIL_DRIVER:-resend}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      SIGNED_LINK_SECRET: ${SIGNED_LINK_SECRET:-changeme}
      NEXT_PUBLIC_URL: ${NEXT_PUBLIC_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
