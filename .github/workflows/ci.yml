name: CI

on:
  push:
    branches: [main, "sre/**", "feat/**", "fix/**", "chore/**", "ops/**", "backend/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Install + typecheck + lint + test ──────────────────────────────────────────
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun typecheck

      - name: Lint
        run: bun lint

      - name: Test (unit only — integration tests run in sqlever-migrate job)
        run: bun test --path-ignore-patterns='tests/integration/**'

  # ── axe a11y stub ──────────────────────────────────────────────────────────────
  # Full a11y coverage lands in #9. This job wires the CI slot so it is always
  # present in the required-checks list. It starts Next.js dev server and runs
  # axe against the home route.
  axe:
    name: axe-a11y
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install axe-core CLI
        run: bun add -g @axe-core/cli

      - name: Start Next.js dev server
        working-directory: apps/web
        run: |
          bun run dev &
          # Wait up to 30s for the server to be ready
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/ && break
            sleep 1
          done
        env:
          PORT: 3000

      - name: Run axe against home page
        # Stub: axe runs but zero-violation gate is enforced in #9.
        # Any violations here produce a warning, not a failure, until #9 lands.
        run: |
          axe http://localhost:3000/ --exit || true
        continue-on-error: true

  # ── k6 smoke stub ─────────────────────────────────────────────────────────────
  # Full SLO load tests land after Sprint 1. This job wires the CI slot.
  # The smoke runs for 5s; threshold allows all failures until the app is real.
  k6-smoke:
    name: k6-smoke
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: grafana/setup-k6-action@v1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start Next.js dev server
        working-directory: apps/web
        run: |
          bun run dev &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/ && break
            sleep 1
          done
        env:
          PORT: 3000

      - name: Run k6 smoke
        # Stub: threshold is permissive until Sprint 1 wires real endpoints.
        run: k6 run tests/load/smoke.js
        continue-on-error: true

  # ── sqlever migrate (forward + backward + integration tests) ──────────────────
  sqlever-migrate:
    name: sqlever-migrate
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install sqlever
        run: bun install -g sqlever

      - name: sqlever analyze (must be clean — zero blocking findings)
        working-directory: db
        run: sqlever analyze

      - name: sqlever deploy (forward — all 10 migrations)
        working-directory: db
        run: sqlever deploy "$DATABASE_URL"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

      - name: sqlever verify
        working-directory: db
        run: sqlever verify "$DATABASE_URL"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

      - name: Integration tests (schema constraints)
        run: bun test tests/integration/schema.test.ts
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

      - name: sqlever revert (backward — all migrations)
        working-directory: db
        run: sqlever revert "$DATABASE_URL" -y
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

      - name: sqlever deploy again (idempotency check)
        working-directory: db
        run: sqlever deploy "$DATABASE_URL"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
