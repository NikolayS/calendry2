name: CI

on:
  push:
    branches: [main, "sre/**", "feat/**", "fix/**", "chore/**", "ops/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Install + typecheck + lint + test ──────────────────────────────────────────
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun typecheck

      - name: Lint
        run: bun lint

      - name: Test
        run: bun test

  # ── axe a11y stub ──────────────────────────────────────────────────────────────
  # Full a11y coverage lands in #9. This job wires the CI slot so it is always
  # present in the required-checks list. It starts Next.js dev server and runs
  # axe against the home route.
  axe:
    name: axe-a11y
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install axe-core CLI
        run: bun add -g @axe-core/cli

      - name: Start Next.js dev server
        working-directory: apps/web
        run: |
          bun run dev &
          # Wait up to 30s for the server to be ready
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/ && break
            sleep 1
          done
        env:
          PORT: 3000

      - name: Run axe against home page
        # Stub: axe runs but zero-violation gate is enforced in #9.
        # Any violations here produce a warning, not a failure, until #9 lands.
        run: |
          axe http://localhost:3000/ --exit || true
        continue-on-error: true

  # ── k6 smoke stub ─────────────────────────────────────────────────────────────
  # Full SLO load tests land after Sprint 1. This job wires the CI slot.
  # The smoke runs for 5s; threshold allows all failures until the app is real.
  k6-smoke:
    name: k6-smoke
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: grafana/setup-k6-action@v1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start Next.js dev server
        working-directory: apps/web
        run: |
          bun run dev &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/ && break
            sleep 1
          done
        env:
          PORT: 3000

      - name: Run k6 smoke
        # Stub: threshold is permissive until Sprint 1 wires real endpoints.
        run: k6 run tests/load/smoke.js
        continue-on-error: true

  # ── sqlever migration stub ────────────────────────────────────────────────────
  # Real migrations land in #6. This job wires the CI slot and stays red until
  # migrations exist. The job is expected to fail until #6 lands.
  sqlever-migrate:
    name: sqlever-migrate
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install sqlever
        # sqlever is a Go binary — install from the NikolayS/sqlever releases.
        # Stub: if sqlever is not yet available as a binary release, this step
        # fails loudly which is intentional per the issue scope.
        run: |
          echo "sqlever migration stub — real migrations land in #6"
          echo "Checking sqitch.plan exists:"
          cat db/sqitch.plan
          echo ""
          echo "No migrations to deploy yet. This job is intentionally a stub."
          echo "It will run forward + backward migrations once #6 lands."
        continue-on-error: true

      - name: sqlever deploy (forward)
        run: |
          echo "STUB: sqlever deploy --plan db/sqitch.plan (no migrations yet)"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        continue-on-error: true

      - name: sqlever revert (backward)
        run: |
          echo "STUB: sqlever revert --plan db/sqitch.plan (no migrations yet)"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        continue-on-error: true
