name: CI

on:
  push:
    branches: [main, "sre/**", "web/**", "feat/**", "fix/**", "chore/**", "ops/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Install + typecheck + lint + test ──────────────────────────────────────────
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun typecheck

      - name: Lint
        run: bun lint

      - name: Test (unit + integration)
        run: bun run test

  # ── axe a11y — Playwright smoke (replaces axe-stub from #5) ──────────────────
  axe:
    name: axe-a11y
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Run Playwright + axe smoke tests
        run: bunx playwright test tests/e2e/a11y.spec.ts
        env:
          CI: "true"
          NODE_ENV: test
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:9999
          NEXT_PUBLIC_SUPABASE_ANON_KEY: stub-anon-key

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

  # ── k6 smoke stub ─────────────────────────────────────────────────────────────
  k6-smoke:
    name: k6-smoke
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: grafana/setup-k6-action@v1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start Next.js dev server
        working-directory: apps/web
        run: |
          bun run dev &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/ && break
            sleep 1
          done
        env:
          PORT: 3000
          NODE_ENV: test
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:9999
          NEXT_PUBLIC_SUPABASE_ANON_KEY: stub-anon-key

      - name: Run k6 smoke
        # Stub: threshold is permissive until Sprint 1 wires real endpoints.
        run: k6 run tests/load/smoke.js
        continue-on-error: true

  # ── sqlever migration stub ────────────────────────────────────────────────────
  sqlever-migrate:
    name: sqlever-migrate
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install sqlever
        run: |
          echo "sqlever migration stub — real migrations land in #6"
          echo "Checking sqitch.plan exists:"
          cat db/sqitch.plan
          echo ""
          echo "No migrations to deploy yet. This job is intentionally a stub."
          echo "It will run forward + backward migrations once #6 lands."
        continue-on-error: true

      - name: sqlever deploy (forward)
        run: |
          echo "STUB: sqlever deploy --plan db/sqitch.plan (no migrations yet)"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        continue-on-error: true

      - name: sqlever revert (backward)
        run: |
          echo "STUB: sqlever revert --plan db/sqitch.plan (no migrations yet)"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        continue-on-error: true
